<div class="dashboard-container">
  <!-- 页面标题 -->
  <div class="page-header fade-in">
    <h1 class="page-title">数据可视化看板</h1>
    <p class="page-subtitle">实时监控业务数据与趋势分析</p>
  </div>

  <!-- 顶部筛选栏 -->
  <div class="filter-bar card glass fade-in">
    <div class="filter-row">
      <div class="filter-item">
        <span class="filter-label">📅 开始时间</span>
        <input type="date" [(ngModel)]="filterConditions.startDate" (change)="onFilterChange()">
      </div>
      <div class="filter-item">
        <span class="filter-label">📅 结束时间</span>
        <input type="date" [(ngModel)]="filterConditions.endDate" (change)="onFilterChange()">
      </div>
      <div class="filter-item">
        <span class="filter-label">📁 分类</span>
        <select [(ngModel)]="filterConditions.categoryId" (change)="onFilterChange()">
          <option value="">全部分类</option>
          <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
        </select>
      </div>
      <div class="filter-item search-item">
        <span class="filter-label">🔍 关键字</span>
        <input type="text" placeholder="输入关键字搜索..." [(ngModel)]="filterConditions.keyword" (keyup.enter)="onFilterChange()">
      </div>
      <button class="btn-primary refresh-btn" (click)="refreshCharts()">
        <span class="btn-icon">🔄</span>
        刷新数据
      </button>
    </div>
  </div>

  <!-- 统计卡片区域 -->
  <div class="stats-cards">
    <div class="stat-card gradient-primary scale-in" *ngFor="let card of statsCards; let i = index" [style.animation-delay]="i * 0.1 + 's'">
      <div class="stat-icon-wrapper">
        <span class="stat-icon">{{ card.icon }}</span>
      </div>
      <div class="stat-content">
        <p class="stat-label">{{ card.title }}</p>
        <div class="stat-value-container">
          <span class="stat-value">{{ card.value | numberFormat }}</span>
          <span class="stat-unit">{{ card.unit }}</span>
        </div>
        <div class="stat-trend" *ngIf="card.trend">
          <span [class.trend-up]="card.trend > 0" [class.trend-down]="card.trend < 0">
            {{ card.trend > 0 ? '↑' : '↓' }} {{ Math.abs(card.trend) }}%
          </span>
          <span class="trend-label">较上期</span>
        </div>
      </div>
      <div class="stat-card-decoration"></div>
    </div>
  </div>

  <!-- 图表网格布局 -->
  <div class="charts-grid">
    <div class="chart-card card slide-in-left">
      <div class="chart-header">
        <h3 class="chart-title">📈 趋势分析</h3>
        <span class="chart-subtitle">月度数据变化趋势</span>
      </div>
      <div class="chart-container">
        <app-chart #lineChart [option]="lineChartOption" [loading]="isLoading"></app-chart>
      </div>
    </div>
    
    <div class="chart-card card slide-in-right">
      <div class="chart-header">
        <h3 class="chart-title">📊 数据对比</h3>
        <span class="chart-subtitle">各分类数据对比</span>
      </div>
      <div class="chart-container">
        <app-chart #barChart [option]="barChartOption" [loading]="isLoading"></app-chart>
      </div>
    </div>
    
    <div class="chart-card card full-width fade-in">
      <div class="chart-header">
        <h3 class="chart-title">🥧 分类占比</h3>
        <span class="chart-subtitle">各分类数据占比分布</span>
      </div>
      <div class="chart-container">
        <app-chart #pieChart [option]="pieChartOption" [loading]="isLoading"></app-chart>
      </div>
    </div>
  </div>

  <!-- 快速操作栏 -->
  <div class="quick-actions card glass fade-in">
    <h3 class="actions-title">⚡ 快捷操作</h3>
    <div class="actions-grid">
      <button class="action-btn" (click)="goToDataEntry()">
        <span class="action-icon">📝</span>
        <span class="action-text">数据录入</span>
      </button>
      <button class="action-btn" (click)="goToDataList()">
        <span class="action-icon">📋</span>
        <span class="action-text">数据列表</span>
      </button>
      <button class="action-btn" (click)="exportData()">
        <span class="action-icon">📤</span>
        <span class="action-text">导出数据</span>
      </button>
      <button class="action-btn" (click)="showSettings()">
        <span class="action-icon">⚙️</span>
        <span class="action-text">系统设置</span>
      </button>
    </div>
  </div>
</div>
