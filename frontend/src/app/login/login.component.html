<div class="login-container">
  <!-- 背景装饰 -->
  <div class="background-decoration">
    <div class="decoration-circle circle-1"></div>
    <div class="decoration-circle circle-2"></div>
    <div class="decoration-circle circle-3"></div>
    <div class="decoration-circle circle-4"></div>
  </div>

  <div class="login-card glass">
    <div class="logo-section">
      <div class="logo-icon-wrapper">
        <span class="logo-icon">📊</span>
      </div>
      <h1 class="app-title">智慧数据可视化管理平台</h1>
      <p class="subtitle">Data Visualization Platform</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="请输入用户名"
            (input)="onInputChange()"
          />
        </div>
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error">
          用户名不能为空且至少3个字符
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="请输入密码"
            (input)="onInputChange()"
          />
        </div>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          密码不能为空且至少6个字符
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        <span class="error-icon">❌</span>
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading || !validateForm()" class="login-btn btn-primary">
        <span *ngIf="isLoading" class="btn-content">
          <span class="loading-spinner"></span>
          <span>登录中...</span>
        </span>
        <span *ngIf="!isLoading" class="btn-content">
          <span>登 录</span>
          <span class="btn-arrow">→</span>
        </span>
      </button>

      <div class="tips">
        <span class="tip-icon">💡</span>
        <span>默认账号：admin / admin123</span>
      </div>
    </form>

    <div class="footer">
      <p>© 2026 智慧数据可视化管理平台 | All Rights Reserved</p>
    </div>
  </div>
</div>
